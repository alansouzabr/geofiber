services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geofiber_db
    environment:
      POSTGRES_DB: geofiber
      POSTGRES_USER: geofiber
      POSTGRES_PASSWORD: geofiber123
    ports:
      - "5432:5432"
    volumes:
      - geofiber_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geofiber -d geofiber"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: geofiber_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - geofiber_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  geofiber_db_data:
  geofiber_redis_data:
